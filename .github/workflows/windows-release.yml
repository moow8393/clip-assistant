name: Windows Release

on:
  push:
    tags: [ 'win-v*' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build, Test & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile ClipAssistant.exe
        shell: pwsh
        run: |
          $csc = 'C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe'
          & $csc /target:winexe /optimize+ `
            /out:windows\ClipAssistant.exe `
            /r:System.Windows.Forms.dll `
            /r:System.Drawing.dll `
            /r:System.Runtime.InteropServices.dll `
            windows\src\Program.cs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -SkipPublisherCheck -MinimumVersion 5.0 -Scope CurrentUser
          Invoke-Pester ./windows/tests/ClipAssistant.Tests.ps1 -Output Detailed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Windows ${{ github.ref_name }}"
          files: windows/ClipAssistant.exe
