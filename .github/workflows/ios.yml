name: iOS CI

on:
  push:
    tags: [ 'ios-v*' ]
  pull_request:
    branches: [ main ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep "iPhone 1[6-9]\|iPhone [2-9][0-9]" | head -5

      - name: Build & Run Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/ClipAssistant.xcodeproj \
            -scheme ClipAssistant \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "=== Build/Test Errors ==="
            grep -E "error:" build.log | grep -v "^note:" | head -40 || true
          fi
          exit $EXIT_CODE

      - name: Show test summary
        if: always()
        run: |
          echo "=== Test Results ==="
          grep -E "Test Suite '|Test Case '-\[|Executed [0-9]+ test" build.log \
            | grep -v "started at" \
            | tail -30 \
            || echo "(no test output — build failed before tests ran)"

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7

  build-ipa:
    name: Build IPA (unsigned, for Sideloadly)
    runs-on: macos-15
    needs: test
    if: startsWith(github.ref, 'refs/tags/ios-v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ios/ClipAssistant.xcodeproj \
            -scheme ClipAssistant \
            -destination 'generic/platform=iOS' \
            -archivePath ClipAssistant.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee archive.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== Archive Errors ==="
            grep -E "error:" archive.log | grep -v "^note:" | head -40 || true
          fi
          exit $EXIT_CODE

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ClipAssistant.xcarchive/Products/Applications/ClipAssistant.app Payload/
          zip -r ClipAssistant.ipa Payload/
          echo "IPA size: $(du -sh ClipAssistant.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipAssistant-${{ github.run_number }}
          path: ClipAssistant.ipa
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "iOS ${{ github.ref_name }}"
          files: ClipAssistant.ipa
